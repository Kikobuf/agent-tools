name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install and build n8n-mcp
        run: |
          cd packages/n8n-mcp
          npm install
          npm run build

      - name: Install and build ollama-mcp
        run: |
          cd packages/ollama-mcp
          npm install
          npm run build

      - name: Verify binaries exist
        run: |
          test -f packages/n8n-mcp/dist/index.js && echo "✓ n8n-mcp dist exists"
          test -f packages/ollama-mcp/dist/index.js && echo "✓ ollama-mcp dist exists"
