name: Publish to npm

on:
  push:
    tags:
      - "n8n-mcp/v*"
      - "ollama-mcp/v*"

jobs:
  publish-n8n:
    if: startsWith(github.ref, 'refs/tags/n8n-mcp/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: cd packages/n8n-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ollama:
    if: startsWith(github.ref, 'refs/tags/ollama-mcp/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: cd packages/ollama-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
